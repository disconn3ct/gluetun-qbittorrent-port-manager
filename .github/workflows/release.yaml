name: Release GO binaries

on:
  release:
    types: [published]

jobs:
  releases-matrix:
    name: Release Go Binary
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # build and publish in parallel: linux/386, linux/amd64, linux/arm64, windows/386, windows/amd64, darwin/amd64, darwin/arm64
        goos: [linux, windows]
        goarch: ["386", amd64, arm64, arm]
        exclude:
        - goarch: arm64
          goos: windows
        - goarch: arm
          goos: windows
    steps:
    - uses: actions/checkout@a37ce9120846195fa4ece8f58b268e6043cb2f26 # v3
    - uses: wangyoucao577/go-release-action@279495102627de7960cbc33434ab01a12bae144b # v1.55
      with:
        github_token: ${{ secrets.GIT_HUB_TOKEN }}
        goos: ${{ matrix.goos }}
        goarch: ${{ matrix.goarch }}
        goversion: "1.25.0"
        binary_name: "gluetun-qbittorrent-port-manager"
        ldflags: "-s -w"
        extra_files: README.md
        retry: 10
        overwrite: true
        release_name: ${{ github.event.release.tag_name }}
        pre_command: sed -i 's/{{RELEASE_TAG}}/${{ github.event.release.tag_name }}/g' modules/files.go # Replace release variable with the name of this release